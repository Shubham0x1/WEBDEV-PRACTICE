<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Flipper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Color Flipper</h1>
        <input type="text" id="color-input" placeholder="Enter colour code">
        <div class="btn-container">
            <div class="btn" id="generate-color">Generate Color</div>
            <div class="btn" id="random-color">Surprise Me!</div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
